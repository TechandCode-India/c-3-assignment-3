<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Squid Game - Landing</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg" aria-hidden="true">
      <span class="bg__word bg__word--game">GAME</span>
      <span class="bg__word bg__word--squid">SQUID</span>
    </div>

    <header class="header">
      <a class="brand" href="#" aria-label="Squid Game home">
        <span class="brand__mark" aria-hidden="true">
          <span class="brand__dot"></span>
          <span class="brand__dot"></span>
          <span class="brand__dot"></span>
        </span>
        <span class="brand__text">
          <span>SQUID</span>
          <span>GAME</span>
        </span>
      </a>

      <nav class="nav" aria-label="Primary">
        <a class="nav__link" href="#">About</a>
        <a class="nav__link nav__link--active" href="#">Watch now</a>
        <a class="nav__link" href="#">Actors</a>
        <a class="nav__link" href="#">Contact</a>
      </nav>

      <button class="menu" type="button" aria-label="Open menu">
        <span class="menu__bar"></span>
        <span class="menu__bar"></span>
        <span class="menu__bar"></span>
      </button>
    </header>

    <main class="wrap">
      <section class="hero" aria-label="Hero">
        <div class="hero__left">
          <h1 class="hero__title">
            <span>SQUID</span>
            <span>GAME</span>
          </h1>

          <p class="hero__desc">
            Action / Thriller / Drama Series directed by Dong-hyuk Hwang
            <br />
            <span class="hero__muted">Season 1: 9 Episodes</span>
          </p>

          <div class="hero__cta">
            <a class="btn btn--primary" href="#">
              <span class="btn__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <path
                    d="M10 8.8v6.4a.8.8 0 0 0 1.24.66l5.06-3.2a.8.8 0 0 0 0-1.32l-5.06-3.2A.8.8 0 0 0 10 8.8Z"
                    fill="currentColor"
                  />
                </svg>
              </span>
              Play Now
            </a>
            <a class="btn btn--ghost" href="#">
              <span class="btn__icon btn__icon--ghost" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <path
                    d="M10.4 9.1v5.8a.7.7 0 0 0 1.1.6l4.6-2.9a.7.7 0 0 0 0-1.2l-4.6-2.9a.7.7 0 0 0-1.1.6Z"
                    stroke="currentColor"
                    stroke-width="1.6"
                    stroke-linejoin="round"
                  />
                </svg>
              </span>
              Watch Trailer
            </a>
          </div>
        </div>

        <div class="hero__mid" aria-hidden="true">
          <div class="scroll">
            <span class="scroll__text">SCROLL</span>
            <span class="scroll__line"></span>
          </div>
        </div>

        <div class="hero__right">
          <div class="character" aria-label="Masked guard">
            <img
              src="https://picsum.photos/seed/squid-hero/1200/1400"
              alt="Masked guard in red suit"
              loading="eager"
            />
            <div class="character__frame" aria-hidden="true"></div>
          </div>

          <aside class="social" aria-label="Social links">
            <a class="social__link" href="#" aria-label="Instagram">
              <svg viewBox="0 0 24 24" fill="none">
                <path
                  d="M7.5 2.8h9A4.7 4.7 0 0 1 21.2 7.5v9A4.7 4.7 0 0 1 16.5 21.2h-9A4.7 4.7 0 0 1 2.8 16.5v-9A4.7 4.7 0 0 1 7.5 2.8Z"
                  stroke="currentColor"
                  stroke-width="1.5"
                />
                <path
                  d="M12 16.2A4.2 4.2 0 1 0 12 7.8a4.2 4.2 0 0 0 0 8.4Z"
                  stroke="currentColor"
                  stroke-width="1.5"
                />
                <path
                  d="M17.4 6.9h.01"
                  stroke="currentColor"
                  stroke-width="2.6"
                  stroke-linecap="round"
                />
              </svg>
            </a>
            <a class="social__link" href="#" aria-label="Twitter / X">
              <svg viewBox="0 0 24 24" fill="none">
                <path
                  d="M18.9 3.6h2.1l-4.6 5.2 5.4 7.6h-4.2l-3.3-4.6-4 4.6H8.2l5-5.7-5.2-7.1h4.3l3 4.1 3.6-4.1Z"
                  fill="currentColor"
                />
              </svg>
            </a>
            <a class="social__link" href="#" aria-label="Facebook">
              <svg viewBox="0 0 24 24" fill="none">
                <path
                  d="M13.7 21v-7.6h2.5l.4-3h-2.9V8.5c0-.9.2-1.5 1.5-1.5h1.5V4.3c-.7-.1-1.6-.2-2.7-.2-2.7 0-4.5 1.6-4.5 4.6v1.7H7.1v3h2.4V21h4.2Z"
                  fill="currentColor"
                />
              </svg>
            </a>
          </aside>
        </div>
      </section>

      <section class="rail" aria-label="Featured videos">
        <article class="tile tile--wide">
          <img
            src="https://picsum.photos/seed/squid-1/1200/700"
            alt="Featured video 1"
            loading="lazy"
          />
          <button class="tile__play" type="button" aria-label="Play video 1">
            <span aria-hidden="true"></span>
          </button>
          <div class="tile__shade" aria-hidden="true"></div>
          <div class="tile__brand" aria-hidden="true">
            <span>SQUID</span><span>GAME</span>
          </div>
        </article>

        <article class="tile">
          <img
            src="https://picsum.photos/seed/squid-2/1200/700"
            alt="Featured video 2"
            loading="lazy"
          />
          <button class="tile__play" type="button" aria-label="Play video 2">
            <span aria-hidden="true"></span>
          </button>
          <div class="tile__shade" aria-hidden="true"></div>
        </article>

        <article class="tile">
          <img
            src="https://picsum.photos/seed/squid-3/1200/700"
            alt="Featured video 3"
            loading="lazy"
          />
          <button class="tile__play" type="button" aria-label="Play video 3">
            <span aria-hidden="true"></span>
          </button>
          <div class="tile__shade" aria-hidden="true"></div>
        </article>
      </section>
    </main>
  </body>
</html>
