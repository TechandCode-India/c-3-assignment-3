<!doctype html>

    <title>Explore Art Work</title>
    <link rel="stylesheet" href="style.css" />

    <div class="bg" aria-hidden="true">
      <span class="dot dot--a"></span>
      <span class="dot dot--b"></span>
      <span class="dot dot--c"></span>
      <span class="dot dot--d"></span>
      <span class="dot dot--e"></span>
      <span class="dot dot--f"></span>
      <span class="dot dot--g"></span>
      <span class="dot dot--h"></span>

          <div class="thumb">
            <img
              src="https://images.unsplash.com/photo-1511765224389-37f0e77cf0eb?auto=format&fit=crop&w=600&q=80"
              alt="Monocular artwork"
              loading="lazy"
            />

            <h2 class="name">Monocular</h2>
            <div class="like" aria-label="54.8k likes">
              <span class="count">54.8k</span>
              <span class="heart" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <path

                    stroke="currentColor"
                    stroke-width="1.6"
                    stroke-linejoin="round"

                </svg>

          </div>
          <button class="bid" type="button">Place Bid</button>
        </article>
